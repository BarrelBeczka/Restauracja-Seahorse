version: '3.8'

services:
  db:
    image: postgres:16
    container_name: restauracja_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-restauracja}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: restauracja_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=restauracja
      - DB_HOST=db
      - DB_PORT=5432
      - JWT_SECRET=super-tajny-klucz-rezerwacji
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: restauracja_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
