<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" fill="none">
  <!-- Całość w delikatnej przezroczystości wtapiającej się w tło #f2ead0 -->
  <g opacity="0.09">
    
    <!-- ================= ORYGINALNE LOGO ================= -->
    <image href="/SEAHORSE_logo.png" x="420" y="420" width="160" height="160" />
    <image href="/SEAHORSE_logo.png" x="800" y="100" width="120" height="120" opacity="0.8" transform="rotate(15 860 160)"/>
    <image href="/SEAHORSE_logo.png" x="100" y="700" width="130" height="130" opacity="0.6" transform="rotate(-15 165 765)"/>

    <!-- ================= JAPOŃSKIE NAPISY ================= -->
    <text x="150" y="200" font-family="sans-serif" font-weight="bold" font-size="60" fill="#2B2A29" transform="rotate(-10 150 200)">寿司</text> <!-- Sushi -->
    <text x="750" y="800" font-family="sans-serif" font-weight="bold" font-size="50" fill="#E33524" transform="rotate(15 750 800)">海馬</text> <!-- Seahorse -->
    <text x="800" y="400" font-family="sans-serif" font-weight="bold" font-size="45" fill="#EF7C22" transform="rotate(-5 800 400)">美味しい</text> <!-- Oishii (Delicious) -->
    <text x="250" y="850" font-family="sans-serif" font-weight="bold" font-size="50" fill="#2B2A29" transform="rotate(-20 250 850)">刺身</text> <!-- Sashimi -->
    <text x="450" y="120" font-family="sans-serif" font-weight="bold" font-size="40" fill="#E33524">予約</text> <!-- Yoyaku (Reservation) -->
    <text x="50" y="100" font-family="sans-serif" font-weight="bold" font-size="35" fill="#EF7C22" transform="rotate(5 50 100)">日本</text> <!-- Nippon (Japan) -->
    <text x="650" y="480" font-family="sans-serif" font-weight="bold" font-size="38" fill="#2B2A29" transform="rotate(-15 650 480)">和食</text> <!-- Washoku -->
    <text x="900" y="700" font-family="sans-serif" font-weight="bold" font-size="42" fill="#E33524" transform="rotate(10 900 700)">魚</text> <!-- Sakana (Fish) -->

    <!-- ================= RÓŻNORODNE SUSHI ================= -->
    <!-- 1. Futomaki (Gruba rolka) -->
    <g transform="translate(100, 400) rotate(25) scale(2.2)">
      <rect x="-20" y="-20" width="40" height="40" rx="20" fill="#2B2A29" /> <!-- Nori -->
      <circle cx="0" cy="0" r="16" fill="#f2ead0" /> <!-- Ryż -->
      <path d="M-5,-5 L5,-5 L0,5 Z" fill="#E33524" /> <!-- Tuńczyk -->
      <rect x="-8" y="2" width="6" height="6" fill="#EF7C22" /> <!-- Łosoś -->
      <circle cx="6" cy="-2" r="3" fill="#2B2A29" /> <!-- Grzyb -->
      <path d="M-2,-10 Q2,-12 5,-8" fill="none" stroke="#EF7C22" stroke-width="2" /> <!-- Tykwa -->
    </g>

    <!-- 2. Uramaki (Odwrócona rolka) -->
    <g transform="translate(700, 600) rotate(-15) scale(2)">
      <circle cx="0" cy="0" r="18" fill="#f2ead0" stroke="#EF7C22" stroke-width="2" stroke-dasharray="2,2"/> <!-- Ryż -->
      <circle cx="0" cy="0" r="10" fill="#2B2A29" /> <!-- Nori -->
      <circle cx="0" cy="0" r="6" fill="#E33524" /> <!-- Tuńczyk -->
      <!-- Sezam -->
      <circle cx="-12" cy="-12" r="1.5" fill="#2B2A29" />
      <circle cx="12" cy="12" r="1.5" fill="#2B2A29" />
      <circle cx="-12" cy="12" r="1.5" fill="#2B2A29" />
      <circle cx="12" cy="-12" r="1.5" fill="#2B2A29" />
      <circle cx="0" cy="-16" r="1.5" fill="#E33524" />
      <circle cx="0" cy="16" r="1.5" fill="#E33524" />
      <circle cx="-16" cy="0" r="1.5" fill="#E33524" />
      <circle cx="16" cy="0" r="1.5" fill="#E33524" />
    </g>

    <!-- 3. Salmon Nigiri -->
    <g transform="translate(500, 250) rotate(-30) scale(1.8)">
      <rect x="-22" y="0" width="44" height="16" rx="8" fill="#ffffff" stroke="#2B2A29" stroke-width="2"/>
      <path d="M-25,-2 C-20,-12 20,-12 25,-2 C27,3 20,8 15,8 L-15,8 C-20,8 -27,3 -25,-2 Z" fill="#EF7C22" />
      <path d="M-15,-6 L-5,-2 M-5,-8 L5,-4 M5,-10 L15,-6" stroke="#f2ead0" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="-6" y="-8" width="12" height="26" fill="#2B2A29" />
    </g>

    <!-- 4. Ebi Nigiri (Krewetka) -->
    <g transform="translate(250, 600) rotate(45) scale(1.8)">
      <rect x="-22" y="0" width="44" height="16" rx="8" fill="#ffffff" stroke="#2B2A29" stroke-width="2"/>
      <path d="M-25,5 C-25,-5 -15,-10 -5,-10 C5,-10 15,-5 20,0 C25,5 30,8 35,5 C35,10 30,12 25,10 C20,15 10,15 0,15 C-10,15 -25,15 -25,5 Z" fill="#E33524" />
      <path d="M25,10 L35,15 L30,5 Z" fill="#EF7C22" />
      <path d="M-15,-7 L-15,12 M-5,-9 L-5,14 M5,-9 L5,14 M15,-6 L15,12" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- 5. Temaki (Rożek nori) -->
    <g transform="translate(320, 80) rotate(60) scale(1.6)">
      <!-- Ryż w środku -->
      <circle cx="-10" cy="-10" r="12" fill="#ffffff" />
      <circle cx="-15" cy="-8" r="4" fill="#EF7C22" />
      <circle cx="-6" cy="-12" r="3.5" fill="#E33524" />
      <!-- Rożek Nori -->
      <path d="M-25,-25 L15,20 L-10,25 Z" fill="#2B2A29" />
    </g>

    <!-- 6. Onigiri (Trójkąt ryżowy) -->
    <g transform="translate(620, 350) rotate(-10) scale(1.5)">
      <path d="M-25,20 L0,-25 L25,20 Z" fill="#ffffff" stroke="#2B2A29" stroke-width="2" />
      <!-- Nori -->
      <rect x="-10" y="5" width="20" height="15" fill="#2B2A29" />
    </g>

    <!-- 7. Ramen / Zupa Miso -->
    <g transform="translate(900, 900) rotate(0) scale(1.5)">
      <!-- Miska -->
      <path d="M-30,0 C-30,25 30,25 30,0 L35,-15 L-35,-15 Z" fill="#E33524" stroke="#2B2A29" stroke-width="2" />
      <!-- Zupka -->
      <rect x="-30" y="-14" width="60" height="13" fill="#EF7C22" />
      <!-- Oparte pałeczki -->
      <rect x="-40" y="-20" width="80" height="3" fill="#2B2A29" transform="rotate(-5)" />
    </g>

    <!-- 8. Kolejne Futomaki -->
    <g transform="translate(900, 480) rotate(-45) scale(1.5)">
      <circle cx="0" cy="0" r="18" fill="#2B2A29" />
      <circle cx="0" cy="0" r="14" fill="#ffffff" />
      <rect x="-5" y="-5" width="10" height="10" fill="#EF7C22" />
    </g>

    <!-- 9. Kolejne Uramaki -->
    <g transform="translate(80, 920) rotate(15) scale(1.6)">
      <circle cx="0" cy="0" r="16" fill="#f2ead0" stroke="#2B2A29" stroke-width="1.5" />
      <circle cx="0" cy="0" r="9" fill="#2B2A29" />
      <circle cx="0" cy="0" r="5" fill="#E33524" />
    </g>

    <!-- ================= INNE ELEMENTY ================= -->
    <!-- Sos Sojowy -->
    <g transform="translate(150, 80) rotate(-10) scale(1.6)">
      <path d="M-15,30 L15,30 L10,0 Q10,-10 5,-15 L-5,-15 Q-10,-10 -10,0 Z" fill="#2B2A29" />
      <path d="M-7,-15 L7,-15 L7,-25 L-7,-25 Z" fill="#E33524" />
      <path d="M-7,-20 L-12,-25" stroke="#E33524" stroke-width="2" stroke-linecap="round"/>
      <path d="M7,-20 L12,-15" stroke="#E33524" stroke-width="2" stroke-linecap="round"/>
      <rect x="-10" y="5" width="20" height="15" fill="#ffffff" />
      <circle cx="0" cy="12" r="3" fill="#E33524" />
    </g>

    <!-- Pałeczki -->
    <g transform="translate(600, 850) rotate(-25) scale(1.8)">
      <rect x="-15" y="10" width="30" height="10" rx="4" fill="#E33524" />
      <rect x="-60" y="-4" width="120" height="5" rx="2.5" fill="#2B2A29" />
      <rect x="-60" y="4" width="120" height="5" rx="2.5" fill="#2B2A29" />
    </g>

    <!-- Kwiaty Wiśni (Sakura) -->
    <g transform="translate(850, 600) scale(1.8)">
      <path d="M0,-15 C10,-25 20,-10 5,-5 C20,0 15,15 5,5 C0,20 -15,15 -5,5 C-20,10 -20,-5 -5,-5 C-15,-15 -5,-25 0,-15 Z" fill="#E33524" />
      <circle cx="0" cy="0" r="3" fill="#EF7C22" />
    </g>
    <g transform="translate(300, 250) rotate(45) scale(1.4)">
      <path d="M0,-15 C10,-25 20,-10 5,-5 C20,0 15,15 5,5 C0,20 -15,15 -5,5 C-20,10 -20,-5 -5,-5 C-15,-15 -5,-25 0,-15 Z" fill="#EF7C22" />
      <circle cx="0" cy="0" r="3" fill="#E33524" />
    </g>
    <g transform="translate(480, 780) rotate(15) scale(1.3)">
      <path d="M0,-15 C10,-25 20,-10 5,-5 C20,0 15,15 5,5 C0,20 -15,15 -5,5 C-20,10 -20,-5 -5,-5 C-15,-15 -5,-25 0,-15 Z" fill="#E33524" />
      <circle cx="0" cy="0" r="3" fill="#EF7C22" />
    </g>

    <!-- ================= DROBNE AKCENTY ================= -->
    <circle cx="200" cy="300" r="8" fill="#E33524" />
    <circle cx="700" cy="200" r="10" fill="#EF7C22" />
    <circle cx="450" cy="650" r="7" fill="#2B2A29" />
    <circle cx="900" cy="300" r="7" fill="#E33524" />
    <circle cx="100" cy="500" r="12" fill="#EF7C22" />
    <circle cx="650" cy="450" r="8" fill="#2B2A29" />
    <circle cx="50" cy="900" r="9" fill="#E33524" />
    <circle cx="550" cy="50" r="7" fill="#EF7C22" />
    <circle cx="350" cy="480" r="6" fill="#E33524" />
    <circle cx="750" cy="720" r="8" fill="#2B2A29" />
  </g>
</svg>
